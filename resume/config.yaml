baseURL: /resume
title: Gabriel Esposito | Resume
languageCode: en-us
disableKinds: [taxonomy, term, page, section, RSS, sitemap, robotsTXT, '404']
theme: resume-a4

params:
  useFontAwesome: true
  externalLinkIcon: true
  favicon: true

  header:
    useFontAwesome: true
    contactOnSide: true
    avatar: false
    contact: true
    tagline: true
    links: false

  css:
    - custom.scss

  pages:
    # ─── PAGE 1 ────────────────────────────────────────────────
    - header: true

      side:
        - feature: certifications
          title: Certifications
          widget: details-list

        - feature: skills
          title: Skills
          widget: word-list
          style: compact

      features:
        - feature: about
          title: Summary

        - feature: experience

    # ─── PAGE 2 (experience cont. + hackathons + open source) ──
    - header: true
      side: false

      features:
        - feature: experience
          title: Experience (Cont.)

        - feature: hackathons
          title: Hackathon Awards
          widget: details-list

        - feature: opensource
          title: Open Source
          widget: details-list

  experience:
    grouped: false
    tools:
      show: true
      title: Technologies

  education:
    useFontAwesome: false
    externalLinkIcon: false
    location:
      show: false
    details:
      show: false
    namePrimary: false

  itemTitle:
    useFontAwesome: false
    externalLinkIcon: true

  footer:
    show: true
    credits: true
    footnote: >-
      Available for part-time engagements.
    links:
      - prefix: Connect on
        title: LinkedIn
        url: 'https://linkedin.com/in/'
        icon: fab fa-linkedin
      - prefix: View on
        title: GitHub
        url: 'https://github.com/'
        icon: fab fa-github
