#docker pull cibuilds/hugo:0.157.0
version: '2.1'
orbs:
  hugo: circleci/hugo@1.4.0

jobs:
  deploySite:
    docker:
      - image: hugomods/hugo:reg-ci-0.154.5
    steps:
      - attach_workspace:
          at: .
      - run: cd site_root && hugo version && HUGO_ENVIRONMENT=production hugo deploy

  deployResume:
    docker:
      - image: hugomods/hugo:reg-ci-0.154.5
    steps:
      - checkout:
          path: repo/
      - attach_workspace:
          at: repo/resume/public/
      - run: 
          command: ls -la . && \
               /bin/hugo version && \
               HUGO_ENVIRONMENT=production /bin/hugo deploy
          working_directory: repo/resume/

workflows:
  master:
    jobs:
      - hugo/build:
          name: site
          html-proofer: false
          source: site_root/
          version: 0.154.5
          hugo-env: production
          persist-to-workspace: true        # ← tell the orb to persist
          destination: site_root_public/

      - hugo/build:
          name: resume
          html-proofer: false
          source: resume/
          version: 0.154.5
          persist-to-workspace: true        # ← tell the orb to persist
          destination: resume_public/
          hugo-env: production
      

      # - deploySite:
      #     filters:
      #       branches:
      #         only: fix-deploy
      #     requires:
      #       - site

      - deployResume:
          filters:
            branches:
              only: fix-deploy
          requires:
            - resume