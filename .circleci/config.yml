#docker pull cibuilds/hugo:0.157.0
version: '2.1'
orbs:
  hugo: circleci/hugo@1.4.0
jobs:
  deploySite:
    docker:
      - image: cibuilds/hugo:0.158.0
    steps:
      - attach_workspace:
          at: site_root
      - run: hugo deploy
  deployResume:
    docker:
      - image: cibuilds/hugo:0.158.0
    steps:
      - attach_workspace:
          at: site_root
      - run: hugo deploy


workflows:
  master:
    jobs:
      - hugo/build:
          name: site
          html-proofer: false
          source: site_root/
          version: 0.158.0 
      - hugo/build:
          name: resume
          html-proofer: false
          source: resume/
          version: 0.158.0 
      - deploySite:
          filters:
            branches:
              only: fix-deploy
          requires:
            - site