#docker pull cibuilds/hugo:0.157.0
version: '2.1'
orbs:
  hugo: circleci/hugo@1.4.0
jobs:
  deploy:
    docker:
      - image: cibuilds/hugo:0.158.0
    steps:
      - attach_workspace:
          at: site_root
      - run: hugo deploy
workflows:
  main:
    jobs:
      - hugo/build:
          html-proofer: true
          source: site_root/
          version: 0.141.0
      - deploy:
          filters:
            branches:
              only: fix-deploy
          requires:
            - hugo/build