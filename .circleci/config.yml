#docker pull cibuilds/hugo:0.157.0
version: '2.1'
orbs:
  hugo: circleci/hugo@1.4.0
jobs:
  deploySite:
    docker:
      - image: hugomods/hugo:reg-ci-0.154.5
    steps:
      - checkout
      - attach_workspace:
          at: site_root/
      - run: hugo version && HUGO_ENVIRONMENT=production hugo deploy
  deployResume:
    docker:
      - image: hugomods/hugo:reg-ci-0.154.5
    steps:
      - checkout
      - attach_workspace:
          at: resume/
      - run: hugo version && rm -rf themes/resume-a4/static/favicon/* &&  HUGO_ENVIRONMENT=production hugo deploy


workflows:
  master:
    jobs:
      - hugo/build:
          name: site
          html-proofer: false
          source: site_root/
          version: 0.154.5 
      - hugo/build:
          name: resume
          html-proofer: false
          source: resume/
          version: 0.154.5
      - deploySite:
          filters:
            branches:
              only: fix-deploy
          requires:
            - site